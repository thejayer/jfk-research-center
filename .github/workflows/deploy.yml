name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: jfk-vault

      - name: Deploy to Cloud Run
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          REDACTION_REVIEW_BUCKET: ${{ secrets.REDACTION_REVIEW_BUCKET }}
        # Every deploy re-asserts the full expected env. Add new vars here
        # plus a repo secret so a fresh rollout is self-contained.
        run: |
          gcloud run deploy jfk-research-center \
            --source=. \
            --region=us-central1 \
            --project=jfk-vault \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi --cpu=1 \
            --max-instances=3 --min-instances=0 \
            --set-env-vars="^|^JFK_BQ_PROJECT=jfk-vault|ADMIN_TOKEN=${ADMIN_TOKEN}|ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}|REDACTION_REVIEW_BUCKET=${REDACTION_REVIEW_BUCKET}" \
            --quiet

  axe:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright-core install --with-deps chromium
      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright-core install-deps chromium
      - name: Run axe-core audit against deployed site
        run: node scripts/axe-audit.mjs "https://jfk-research-center-690906762945.us-central1.run.app"
      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-report.json
          if-no-files-found: warn
